  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1f0a" />
      <stop offset="35%" stop-color="#1a1005" />
      <stop offset="70%" stop-color="#0a0804" />
      <stop offset="100%" stop-color="#020102" />
    </radialGradient>
    <radialGradient id="planetGrad" cx="70%" cy="30%">
      <stop offset="0%" stop-color="#a8c8e8" />
      <stop offset="40%" stop-color="#5b8ab5" />
      <stop offset="75%" stop-color="#2a5a8a" />
      <stop offset="100%" stop-color="#1a3a5a" />
    </radialGradient>
    <radialGradient id="haloGrad" cx="70%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#88ccff" stop-opacity="0" />
      <stop offset="50%" stop-color="#66aaee" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#4488cc" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#2266aa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="milkyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0" />
      <stop offset="20%" stop-color="#c8a96e" stop-opacity="0.08" />
      <stop offset="45%" stop-color="#d4bc82" stop-opacity="0.18" />
      <stop offset="55%" stop-color="#d4bc82" stop-opacity="0.18" />
      <stop offset="80%" stop-color="#c8a96e" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0" />
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="haloBlur">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <filter id="milkyBlur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

