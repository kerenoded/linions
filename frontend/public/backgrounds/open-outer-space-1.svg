    <circle cx="-20" cy="260" r="120" fill="url(#planetGrad)" clip-path="url(#planetClip)" />

    
    <circle cx="-20" cy="260" r="120" clip-path="url(#planetClip)" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.15" />
