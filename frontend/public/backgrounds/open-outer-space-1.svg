    <circle cx="-20" cy="260" r="125" fill="none" stroke="#88ccff" stroke-width="3" opacity="0.15" filter="url(#haloBlur)" clip-path="url(#planetClip)" />

    
    <ellipse cx="400" cy="100" rx="300" ry="80" fill="#3a2a10" opacity="0.08" filter="url(#milkyBlur)" />

    
    <g id="background-animated-part">
      
      <circle cx="350" cy="38" r="2.0" fill="#fff5cc" filter="url(#starGlow)">
        <animate attributeName="opacity" values="0.4;1.0;0.4" dur="1.8s" repeatCount="indefinite" />
      </circle>

      
      <circle cx="620" cy="72" r="1.8" fill="#ffeebb" filter="url(#starGlow)">
        <animate attributeName="opacity" values="0.2;0.85;0.2" dur="3s" repeatCount="indefinite" begin="0.7s" />
      </circle>

      
      <polygon points="0,0 250,0 800,120 800,180 550,200 0,80" opacity="0.1" filter="url(#milkyBlur)">
        <animate attributeName="fill" values="#c8a96e;#e8d9a0;#c8a96e" dur="6s" repeatCount="indefinite" />
      </polygon>

      
      <g clip-path="url(#planetClip)">
        <circle cx="-20" cy="260" r="130" fill="none" stroke="#77bbee" stroke-width="8" filter="url(#haloBlur)">
          <animate attributeName="opacity" values="0.3;0.65;0.3" dur="4.5s" repeatCount="indefinite" />
        </circle>
      </g>

      
