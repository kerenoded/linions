<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <g id="background-main">
    
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7dd3fc" />
        <stop offset="40%" stop-color="#bae6fd" />
        <stop offset="70%" stop-color="#fde68a" />
        <stop offset="100%" stop-color="#fbbf24" />
      </linearGradient>
      <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4ade80" />
        <stop offset="100%" stop-color="#166534" />
      </linearGradient>
      <linearGradient id="meadowGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#84cc16" />
        <stop offset="100%" stop-color="#365314" />
      </linearGradient>
    </defs>

    
    <rect x="0" y="0" width="800" height="200" fill="url(#skyGrad)" />

    
    <circle cx="650" cy="45" r="35" fill="#fbbf24" opacity="0.9" />
    <circle cx="650" cy="45" r="28" fill="#fef08a" opacity="0.95" />
    <circle cx="650" cy="45" r="18" fill="#fffbeb" opacity="1" />

    
    <ellipse cx="150" cy="35" rx="60" ry="18" fill="#ffffff" opacity="0.7" />
    <ellipse cx="180" cy="30" rx="45" ry="15" fill="#ffffff" opacity="0.65" />
    <ellipse cx="400" cy="50" rx="70" ry="16" fill="#ffffff" opacity="0.5" />
    <ellipse cx="550" cy="28" rx="50" ry="14" fill="#ffffff" opacity="0.45" />

    
    <ellipse cx="200" cy="120" rx="250" ry="45" fill="#22c55e" opacity="0.6" />
    <ellipse cx="550" cy="115" rx="300" ry="50" fill="#16a34a" opacity="0.55" />
    <ellipse cx="750" cy="125" rx="180" ry="40" fill="#15803d" opacity="0.5" />

    
    <ellipse cx="100" cy="130" rx="200" ry="35" fill="#166534" opacity="0.7" />
    <ellipse cx="450" cy="128" rx="280" ry="38" fill="#14532d" opacity="0.65" />

    
    <rect x="0" y="120" width="800" height="80" fill="url(#meadowGrad)" />

    
    <ellipse cx="100" cy="140" rx="80" ry="12" fill="#65a30d" opacity="0.7" />
    <ellipse cx="300" cy="145" rx="100" ry="10" fill="#4d7c0f" opacity="0.6" />
    <ellipse cx="550" cy="138" rx="90" ry="11" fill="#84cc16" opacity="0.5" />
    <ellipse cx="700" cy="150" rx="70" ry="9" fill="#65a30d" opacity="0.6" />

    
    <ellipse cx="125" cy="175" rx="12" ry="3" fill="#1a2e05" opacity="0.3" />
    <ellipse cx="280" cy="168" rx="14" ry="3" fill="#1a2e05" opacity="0.25" />
    <ellipse cx="420" cy="172" rx="11" ry="3" fill="#1a2e05" opacity="0.3" />
    <ellipse cx="560" cy="165" rx="13" ry="3" fill="#1a2e05" opacity="0.28" />
    <ellipse cx="700" cy="170" rx="12" ry="3" fill="#1a2e05" opacity="0.25" />

    
    <circle cx="50" cy="132" r="3" fill="#fbbf24" />
    <circle cx="90" cy="128" r="2.5" fill="#f87171" />
    <circle cx="160" cy="130" r="3" fill="#fb923c" />
    <circle cx="220" cy="133" r="2" fill="#fbbf24" />
    <circle cx="310" cy="129" r="2.5" fill="#f87171" />
    <circle cx="370" cy="131" r="3" fill="#fb923c" />
    <circle cx="440" cy="128" r="2" fill="#fbbf24" />
    <circle cx="500" cy="132" r="2.5" fill="#f87171" />
    <circle cx="580" cy="130" r="3" fill="#fb923c" />
    <circle cx="640" cy="127" r="2" fill="#fbbf24" />
    <circle cx="720" cy="131" r="2.5" fill="#f87171" />
    <circle cx="770" cy="129" r="3" fill="#fb923c" />

    
    
    <line x1="120" y1="200" x2="118" y2="135" stroke="#365314" stroke-width="3" />
    <ellipse cx="118" cy="132" rx="6" ry="5" fill="#fbbf24" />
    <ellipse cx="118" cy="130" rx="4" ry="3" fill="#fef08a" />

    
    <line x1="270" y1="200" x2="272" y2="125" stroke="#365314" stroke-width="3" />
    <ellipse cx="272" cy="122" rx="7" ry="6" fill="#fb923c" />
    <ellipse cx="272" cy="120" rx="4" ry="3" fill="#fed7aa" />

    
    <line x1="410" y1="200" x2="408" y2="130" stroke="#365314" stroke-width="3" />
    <ellipse cx="408" cy="127" rx="6" ry="5" fill="#f87171" />
    <ellipse cx="408" cy="125" rx="3.5" ry="3" fill="#fecaca" />

    
    <line x1="550" y1="200" x2="553" y2="120" stroke="#365314" stroke-width="3.5" />
    <ellipse cx="553" cy="117" rx="7" ry="6" fill="#fbbf24" />
    <ellipse cx="553" cy="115" rx="4" ry="3" fill="#fef9c3" />

    
    <line x1="690" y1="200" x2="688" y2="128" stroke="#365314" stroke-width="3" />
    <ellipse cx="688" cy="125" rx="6" ry="5" fill="#fb923c" />
    <ellipse cx="688" cy="123" rx="3.5" ry="3" fill="#fed7aa" />

    
    <line x1="30" y1="200" x2="28" y2="140" stroke="#365314" stroke-width="2.5" />
    <ellipse cx="28" cy="137" rx="5" ry="4" fill="#f87171" />

    
    <line x1="780" y1="200" x2="778" y2="138" stroke="#365314" stroke-width="2.5" />
    <ellipse cx="778" cy="135" rx="5" ry="4" fill="#fbbf24" />

    
    <rect x="0" y="185" width="800" height="15" fill="#365314" />
    <ellipse cx="60" cy="185" rx="30" ry="8" fill="#4d7c0f" />
    <ellipse cx="180" cy="188" rx="35" ry="7" fill="#365314" />
    <ellipse cx="330" cy="186" rx="40" ry="9" fill="#4d7c0f" />
    <ellipse cx="500" cy="187" rx="35" ry="8" fill="#365314" />
    <ellipse cx="650" cy="185" rx="30" ry="7" fill="#4d7c0f" />
    <ellipse cx="760" cy="188" rx="35" ry="8" fill="#365314" />

    
    <g id="background-animated-part">
      
      <polygon points="650,45 500,200 560,200" fill="#fbbf24" opacity="0.35">
        <animate attributeName="opacity" values="0.15;0.55;0.15" dur="4s" repeatCount="indefinite" />
      </polygon>
      <polygon points="650,45 600,200 680,200" fill="#fde68a" opacity="0.3">
        <animate attributeName="opacity" values="0.15;0.55;0.15" dur="4s" repeatCount="indefinite" begin="0.5s" />
      </polygon>

      
      <ellipse cx="272" cy="122" rx="8" ry="7" fill="#fb923c">
        <animate attributeName="fill" values="#fb923c;#ea580c;#fb923c" dur="3.5s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="272" cy="120" rx="4.5" ry="3.5" fill="#fed7aa" />

      
      <ellipse cx="350" cy="70" rx="120" ry="40" fill="#fde68a" opacity="0.4">
        <animate attributeName="fill" values="#fde68a;#fbbf24;#fde68a" dur="5s" repeatCount="indefinite" />
      </ellipse>

      
      <ellipse cx="250" cy="40" rx="75" ry="20" fill="#ffffff" opacity="0.8">
        <animate attributeName="opacity" values="0.6;1.0;0.6" dur="4s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="280" cy="34" rx="50" ry="16" fill="#ffffff" opacity="0.75">
        <animate attributeName="opacity" values="0.6;1.0;0.6" dur="4s" repeatCount="indefinite" begin="0.3s" />
      </ellipse>

      
      <ellipse cx="408" cy="127" rx="7" ry="6" fill="#f87171">
        <animate attributeName="fill" values="#f87171;#dc2626;#f87171" dur="3s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="408" cy="125" rx="4" ry="3" fill="#fecaca" />
    </g>
  </g>
</svg>