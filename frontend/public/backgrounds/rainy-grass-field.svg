    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a8a5c" />
      <stop offset="100%" stop-color="#4a6e3e" />
    </linearGradient>
    <linearGradient id="fgGrassGrad" x1="0" y1="0" x2="0" y2="1">
