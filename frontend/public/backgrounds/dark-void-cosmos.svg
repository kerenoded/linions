<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="spaceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="55%" stop-color="#0a0806" />
      <stop offset="85%" stop-color="#1a1208" />
      <stop offset="100%" stop-color="#2a1e0e" />
    </linearGradient>
    <radialGradient id="sunBloomGrad" cx="0.85" cy="0.9" r="0.45">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#ffd866" stop-opacity="0.3" />
      <stop offset="70%" stop-color="#ffcc44" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sunCoreGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#ffe08a" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffe08a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="milkyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8d0e8" stop-opacity="0" />
      <stop offset="20%" stop-color="#c8d0e8" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#d8dff0" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#c0c8e0" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#c8d0e8" stop-opacity="0" />
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="bloomFilter">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="milkyBlur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <g id="background-main">
    
    <rect x="0" y="0" width="800" height="200" fill="url(#spaceGrad)" />

    
    <rect x="0" y="120" width="800" height="80" fill="#1a1408" opacity="0.4" />
    <rect x="0" y="160" width="800" height="40" fill="#2a1c0a" opacity="0.25" />

    
    <polygon points="0,10 180,0 800,80 800,130 620,140 0,60" fill="#b8c0d8" opacity="0.06" filter="url(#milkyBlur)" />
    <polygon points="0,20 200,5 800,90 800,120 600,135 0,55" fill="#d0d8f0" opacity="0.04" filter="url(#milkyBlur)" />

    
    <ellipse cx="720" cy="195" rx="250" ry="120" fill="url(#sunBloomGrad)" opacity="0.5" />
    <ellipse cx="730" cy="200" rx="150" ry="80" fill="#ffe08a" opacity="0.08" filter="url(#bloomFilter)" />

    
    <circle cx="45" cy="18" r="0.6" fill="#c8b890" opacity="0.4" />
    <circle cx="112" cy="42" r="0.5" fill="#d0c8a0" opacity="0.35" />
    <circle cx="178" cy="12" r="0.7" fill="#e0d8b0" opacity="0.5" />
    <circle cx="230" cy="67" r="0.4" fill="#b8b090" opacity="0.3" />
    <circle cx="295" cy="25" r="0.6" fill="#d8d0a8" opacity="0.45" />
    <circle cx="340" cy="88" r="0.5" fill="#c0b898" opacity="0.35" />
    <circle cx="390" cy="15" r="0.7" fill="#e8e0c0" opacity="0.5" />
    <circle cx="445" cy="55" r="0.4" fill="#b0a888" opacity="0.3" />
    <circle cx="510" cy="30" r="0.6" fill="#d0c8a0" opacity="0.4" />
    <circle cx="560" cy="72" r="0.5" fill="#c8c098" opacity="0.35" />
    <circle cx="620" cy="20" r="0.6" fill="#e0d8b8" opacity="0.45" />
    <circle cx="680" cy="48" r="0.4" fill="#d8d0a8" opacity="0.3" />
    <circle cx="740" cy="22" r="0.5" fill="#f0e8c8" opacity="0.5" />
    <circle cx="770" cy="65" r="0.4" fill="#e8e0c0" opacity="0.35" />
    <circle cx="80" cy="95" r="0.5" fill="#c0b898" opacity="0.3" />
    <circle cx="155" cy="130" r="0.6" fill="#d8d0b0" opacity="0.4" />
    <circle cx="260" cy="110" r="0.4" fill="#b8b090" opacity="0.3" />
    <circle cx="350" cy="145" r="0.5" fill="#c8c0a0" opacity="0.35" />
    <circle cx="480" cy="120" r="0.6" fill="#d0c8a8" opacity="0.4" />
    <circle cx="550" cy="150" r="0.4" fill="#e0d8b8" opacity="0.35" />
    <circle cx="650" cy="105" r="0.5" fill="#f0e8c8" opacity="0.45" />
    <circle cx="720" cy="135" r="0.4" fill="#ffe8c0" opacity="0.4" />
    <circle cx="30" cy="160" r="0.5" fill="#c0b898" opacity="0.25" />
    <circle cx="420" cy="170" r="0.4" fill="#d8d0b0" opacity="0.3" />
    <circle cx="200" cy="175" r="0.5" fill="#c8c0a0" opacity="0.25" />

    
    <circle cx="68" cy="35" r="1.0" fill="#ffe8c0" opacity="0.55" />
    <circle cx="195" cy="78" r="0.9" fill="#ffd8a0" opacity="0.5" />
    <circle cx="310" cy="45" r="1.1" fill="#fff0d0" opacity="0.6" />
    <circle cx="430" cy="92" r="0.8" fill="#ffe0b0" opacity="0.45" />
    <circle cx="525" cy="38" r="1.0" fill="#fff4d8" opacity="0.55" />
    <circle cx="610" cy="85" r="0.9" fill="#ffd890" opacity="0.5" />
    <circle cx="700" cy="55" r="1.1" fill="#fff0c0" opacity="0.6" />
    <circle cx="140" cy="155" r="0.8" fill="#ffe8b8" opacity="0.4" />
    <circle cx="470" cy="140" r="0.9" fill="#ffd8a0" opacity="0.45" />
    <circle cx="590" cy="165" r="0.8" fill="#ffe0a8" opacity="0.4" />
    <circle cx="760" cy="95" r="1.0" fill="#fff8d8" opacity="0.55" />

    
    <circle cx="250" cy="30" r="1.5" fill="#fff8e8" opacity="0.75" filter="url(#starGlow)" />
    <circle cx="500" cy="60" r="1.3" fill="#ffe8c0" opacity="0.7" filter="url(#starGlow)" />
    <circle cx="150" cy="80" r="1.2" fill="#fff0d0" opacity="0.65" filter="url(#starGlow)" />
    <circle cx="680" cy="35" r="1.4" fill="#fff4d0" opacity="0.7" filter="url(#starGlow)" />
    <circle cx="380" cy="120" r="1.1" fill="#ffe0b0" opacity="0.6" filter="url(#starGlow)" />
    <circle cx="90" cy="140" r="1.2" fill="#fff0d8" opacity="0.55" filter="url(#starGlow)" />

    
    <g id="background-animated-part">
      
      <circle cx="250" cy="30" r="2.2" fill="#fffae8" filter="url(#bigGlow)">
        <animate attributeName="opacity" values="0.3;1.0;0.3" dur="2s" repeatCount="indefinite" />
      </circle>

      
      <circle cx="680" cy="35" r="2.0" fill="#fff4d0" filter="url(#bigGlow)">
        <animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.2s" begin="0.8s" repeatCount="indefinite" />
      </circle>

      
      <polygon points="0,15 160,0 800,85 800,125 640,138 0,58" fill="#c8d4e8" filter="url(#milkyBlur)">
        <animate attributeName="opacity" values="0.1;0.35;0.1" dur="6s" repeatCount="indefinite" />
      </polygon>

      
      <ellipse cx="720" cy="190" rx="180" ry="100" filter="url(#bloomFilter)">
        <animate attributeName="opacity" values="0.4;0.75;0.4" dur="4s" repeatCount="indefinite" />
        
        <animate attributeName="fill" values="#ffe08a;#fff4c2;#ffe08a" dur="5s" repeatCount="indefinite" />
      </ellipse>
    </g>

    
    <ellipse cx="740" cy="198" rx="40" ry="20" fill="url(#sunCoreGrad)" opacity="0.6" />
  </g>
</svg>