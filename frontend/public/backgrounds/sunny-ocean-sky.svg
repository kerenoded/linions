    <radialGradient id="sunRadial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffbe6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#fffbe6" stop-opacity="0" />
    </radialGradient>
  </defs>

