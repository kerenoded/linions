        <rect x="0" y="40" width="800" height="28" rx="14" fill="#7a8a9c" />
        <ellipse cx="300" cy="48" rx="200" ry="18" fill="#6e7e90" />
        <ellipse cx="550" cy="52" rx="170" ry="16" fill="#728294" />
      </g>

      
      <rect x="0" y="0" width="800" height="148" fill="#c0b0d0" opacity="0.1">
        <animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" repeatCount="indefinite" />
