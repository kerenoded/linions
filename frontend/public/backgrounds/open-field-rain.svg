        <line x1="630" y1="0" x2="612" y2="200" stroke="#b8d0e0" stroke-width="0.7" />
        <line x1="700" y1="0" x2="682" y2="200" stroke="#b8d0e0" stroke-width="0.8" />
        <line x1="460" y1="0" x2="442" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
        <line x1="530" y1="0" x2="512" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
        <line x1="600" y1="0" x2="582" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
        <line x1="665" y1="0" x2="647" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
        <line x1="760" y1="0" x2="742" y2="200" stroke="#c0d8e8" stroke-width="0.7" />
