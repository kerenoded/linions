<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b7d8e" />
      <stop offset="40%" stop-color="#8a9bab" />
      <stop offset="70%" stop-color="#a8b5c4" />
      <stop offset="100%" stop-color="#c8b8d0" />
    </linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7a4a" />
      <stop offset="50%" stop-color="#4e6e3e" />
      <stop offset="100%" stop-color="#3d5c30" />
    </linearGradient>
    <linearGradient id="puddleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0c8d8" />
      <stop offset="100%" stop-color="#95afc0" />
    </linearGradient>
  </defs>

  <g id="background-main">
    
