    <line x1="200" y1="0" x2="185" y2="200" stroke="#a0b8cc" stroke-width="0.5" opacity="0.25" />
    <line x1="280" y1="0" x2="265" y2="200" stroke="#a0b8cc" stroke-width="0.5" opacity="0.2" />
    <line x1="350" y1="0" x2="335" y2="200" stroke="#a0b8cc" stroke-width="0.5" opacity="0.25" />
