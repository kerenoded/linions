        <line x1="130" y1="0" x2="112" y2="200" stroke="#b8d0e0" stroke-width="0.7" />
        <line x1="195" y1="0" x2="177" y2="200" stroke="#b8d0e0" stroke-width="0.8" />
        <line x1="260" y1="0" x2="242" y2="200" stroke="#b8d0e0" stroke-width="0.7" />
        <line x1="330" y1="0" x2="312" y2="200" stroke="#b8d0e0" stroke-width="0.8" />
        <line x1="90" y1="0" x2="72" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
        <line x1="160" y1="0" x2="142" y2="200" stroke="#c0d8e8" stroke-width="0.6" />
