    <path d="M0 120 Q40 118 80 120 Q120 122 160 120 Q200 118 240 120 Q280 122 320 120 Q360 118 400 120 Q440 122 480 120 Q520 118 560 120 Q600 122 640 120 Q680 118 720 120 Q760 122 800 120" fill="none" stroke="#3a9898" stroke-width="0.5" opacity="0.3" />

    
