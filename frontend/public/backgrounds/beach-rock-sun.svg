        <animate attributeName="opacity" values="0.15;0.75;0.15" dur="2.8s" repeatCount="indefinite" />
      </ellipse>

      
      <ellipse cx="400" cy="115" rx="55" ry="5" fill="#f0c860" opacity="0.1">
        <animate attributeName="opacity" values="0.1;0.55;0.1" dur="3.2s" begin="1.2s" repeatCount="indefinite" />
      </ellipse>

      
      <rect x="0" y="60" width="800" height="25" fill="#f7c97a" opacity="0.35">
