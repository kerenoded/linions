    <path d="M680 80 Q695 78 710 85 Q720 92 718 105" fill="none" stroke="#8a6030" stroke-width="0.8" opacity="0.3" />

    
    <path d="M620 90 Q615 120 615 140 Q610 170 620 200 L640 200 Q630 170 630 140 Q628 115 630 95 Z" fill="#705028" opacity="0.35" />

    
    <path d="M700 42 Q740 38 770 37 L800 35 L800 80 Q770 60 740 55 Q720 50 700 50 Z" fill="#c8a868" opacity="0.4" />

    
    <ellipse cx="580" cy="155" rx="8" ry="4" fill="#a08040" opacity="0.5" />
