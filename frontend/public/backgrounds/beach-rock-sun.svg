<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8ec2" />
      <stop offset="35%" stop-color="#7daed4" />
      <stop offset="65%" stop-color="#c9a86e" />
      <stop offset="100%" stop-color="#e8b85a" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a9bb5" />
      <stop offset="40%" stop-color="#4db8a8" />
      <stop offset="100%" stop-color="#6dcdb5" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c06a" />
      <stop offset="100%" stop-color="#d4a84e" />
    </linearGradient>
    <linearGradient id="rockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b89558" />
      <stop offset="50%" stop-color="#a07840" />
      <stop offset="100%" stop-color="#8a6a38" />
    </linearGradient>
  </defs>

