      <stop offset="100%" stop-color="#c88b30" />
    </linearGradient>
    <linearGradient id="wetSandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07830" />
      <stop offset="100%" stop-color="#b08838" />
    </linearGradient>
  </defs>
