<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6495ED" />
      <stop offset="40%" stop-color="#9bb8e8" />
      <stop offset="70%" stop-color="#f0b87a" />
      <stop offset="100%" stop-color="#f7c97a" />
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7a9b" />
      <stop offset="50%" stop-color="#3a9ab8" />
      <stop offset="100%" stop-color="#4db8c7" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9943a" />
