<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7bbf" />
      <stop offset="60%" stop-color="#6db8e3" />
      <stop offset="100%" stop-color="#b5ddf0" />
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.85" cy="0.15" r="0.35">
      <stop offset="0%" stop-color="#fffbe6" stop-opacity="1" />
      <stop offset="40%" stop-color="#ffe87c" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffe87c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="hazeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5ddf0" stop-opacity="0" />
      <stop offset="50%" stop-color="#d4eef8" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#e8f5fa" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <g id="background-main">
    
    <rect x="0" y="0" width="800" height="70" fill="url(#skyGrad)" />

    
    <rect x="0" y="130" width="800" height="70" fill="#0e6b7a" />

    
    <rect x="0" y="100" width="800" height="50" fill="#1a8fa3" />

    
    <rect id="surfaceBand" x="0" y="68" width="800" height="45" fill="#4fc3d8" />

    
    <rect x="0" y="155" width="800" height="45" fill="#094e5a" />
    <rect x="0" y="140" width="800" height="20" fill="#0c5d6e" opacity="0.6" />

    
    <path d="M0,78 Q20,74 40,78 Q60,82 80,78 Q100,74 120,78 Q140,82 160,78 Q180,74 200,78 Q220,82 240,78 Q260,74 280,78 Q300,82 320,78 Q340,74 360,78 Q380,82 400,78" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.5" />
    <path d="M400,82 Q420,78 440,82 Q460,86 480,82 Q500,78 520,82 Q540,86 560,82 Q580,78 600,82 Q620,86 640,82 Q660,78 680,82 Q700,86 720,82 Q740,78 760,82 Q780,86 800,82" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />
    <path d="M50,90 Q75,86 100,90 Q125,94 150,90 Q175,86 200,90 Q225,94 250,90 Q275,86 300,90 Q325,94 350,90" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.35" />
    <path d="M350,95 Q380,91 410,95 Q440,99 470,95 Q500,91 530,95 Q560,99 590,95 Q620,91 650,95 Q680,99 710,95 Q740,91 770,95" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3" />
    <path d="M100,105 Q130,101 160,105 Q190,109 220,105 Q250,101 280,105 Q310,109 340,105 Q370,101 400,105" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.25" />

    
    <rect x="0" y="55" width="800" height="25" fill="url(#hazeGrad)" />

    
    <g opacity="0.85">
      <ellipse cx="150" cy="35" rx="45" ry="12" fill="#ffffff" />
      <ellipse cx="170" cy="30" rx="30" ry="10" fill="#ffffff" />
      <ellipse cx="130" cy="32" rx="25" ry="9" fill="#ffffff" />
    </g>
    <g opacity="0.75">
      <ellipse cx="550" cy="42" rx="35" ry="10" fill="#ffffff" />
      <ellipse cx="570" cy="38" rx="25" ry="8" fill="#ffffff" />
      <ellipse cx="535" cy="39" rx="20" ry="7" fill="#ffffff" />
    </g>

    
    <circle cx="680" cy="30" r="120" fill="url(#sunGlow)" opacity="0.7" />
    
    <circle cx="680" cy="30" r="18" fill="#fff8d6" opacity="0.9" />

    
    <g id="background-animated-part">
      
      <path d="M20,85 Q50,79 80,85 Q110,91 140,85 Q170,79 200,85 Q230,91 260,85 Q290,79 320,85 Q350,91 380,85 Q410,79 440,85 Q470,91 500,85 Q530,79 560,85 Q590,91 620,85 Q650,79 680,85 Q710,91 740,85 Q770,79 800,85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7">
        <animate attributeName="opacity" values="0.4;1.0;0.4" dur="2.5s" repeatCount="indefinite" />
      </path>

      
      <path d="M0,100 Q30,95 60,100 Q90,105 120,100 Q150,95 180,100 Q210,105 240,100 Q270,95 300,100 Q330,105 360,100 Q390,95 420,100 Q450,105 480,100 Q510,95 540,100 Q570,105 600,100 Q630,95 660,100 Q690,105 720,100 Q750,95 780,100" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" begin="0.8s" repeatCount="indefinite" />
      </path>

      
      <g opacity="0.85">
        <ellipse cx="350" cy="28" rx="40" ry="11" fill="#ffffff" />
        <ellipse cx="375" cy="23" rx="28" ry="9" fill="#ffffff" />
        <ellipse cx="330" cy="25" rx="22" ry="8" fill="#ffffff" />
        <animate attributeName="opacity" values="0.7;1.0;0.7" dur="4s" repeatCount="indefinite" />
      </g>

      
      <circle cx="680" cy="30" r="90" fill="url(#sunGlow)" opacity="0.65">
        <animate attributeName="opacity" values="0.5;0.85;0.5" dur="3.5s" repeatCount="indefinite" />
      </circle>

      
      <rect x="0" y="68" width="800" height="45" fill="#4fc3d8" opacity="0.6">
        <animate attributeName="fill" values="#4fc3d8;#7de8f5;#4fc3d8" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
