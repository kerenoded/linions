    <radialGradient id="nebulaGrad1" cx="0.65" cy="0.25" r="0.35">
      <stop offset="0%" stop-color="#7b4fa6" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#4a3070" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0a1128" stop-opacity="0" />
