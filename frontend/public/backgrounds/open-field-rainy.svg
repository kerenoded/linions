        <line x1="50" y1="9" x2="47" y2="105" stroke="#b0b8c8" stroke-width="0.7" />
        <line x1="600" y1="11" x2="597" y2="100" stroke="#aab0c0" stroke-width="0.5" />
        <line x1="700" y1="5" x2="698" y2="95" stroke="#aab0c0" stroke-width="0.6" />
