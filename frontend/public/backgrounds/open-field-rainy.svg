      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#b8b8b8" />
        <stop offset="40%" stop-color="#c8c4bc" />
        <stop offset="70%" stop-color="#d8d0c0" />
        <stop offset="100%" stop-color="#e8d8b0" />
      </linearGradient>
      <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5a8a3a" />
        <stop offset="100%" stop-color="#3d6b28" />
      </linearGradient>
    </defs>

    
    <rect x="0" y="0" width="800" height="200" fill="url(#skyGrad)" />

    
