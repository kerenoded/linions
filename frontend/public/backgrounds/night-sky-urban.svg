      <ellipse cx="300" cy="55" rx="280" ry="18" transform="rotate(-25 400 100)" fill="#c0b8e8" opacity="0.12" filter="url(#milkyBlur)" />
      <ellipse cx="350" cy="65" rx="200" ry="12" transform="rotate(-25 400 100)" fill="#a8b8e0" opacity="0.1" filter="url(#milkyBlur)" />
