<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" id="background-root">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510" />
      <stop offset="30%" stop-color="#0a0a2e" />
      <stop offset="60%" stop-color="#111155" />
      <stop offset="85%" stop-color="#1a1a4a" />
      <stop offset="100%" stop-color="#1e1e3a" />
    </linearGradient>
    <linearGradient id="milkyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8b0d8" stop-opacity="0" />
      <stop offset="20%" stop-color="#b8b0d8" stop-opacity="0.15" />
      <stop offset="40%" stop-color="#a8c0e0" stop-opacity="0.3" />
      <stop offset="60%" stop-color="#c0b8e0" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#a0a8d0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#b8b0d8" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="cityGlow" cx="0.5" cy="1" r="0.5">
      <stop offset="0%" stop-color="#f5c060" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f5c060" stop-opacity="0" />
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="4" />
    </filter>
    <filter id="milkyBlur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <g id="background-main">
    
    <rect x="0" y="0" width="800" height="200" fill="url(#skyGrad)" />

    
    <g id="milkyWayStatic" opacity="0.35">
