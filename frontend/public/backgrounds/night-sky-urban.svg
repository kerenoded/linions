        <animate attributeName="opacity" values="0.5;1.0;0.5" dur="2.5s" repeatCount="indefinite" />
      </circle>

      
      <circle cx="580" cy="42" r="1.5" fill="#e0e8ff" filter="url(#starGlow)" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1.2s" repeatCount="indefinite" />
      </circle>

      
      <ellipse cx="250" cy="60" rx="350" ry="28" transform="rotate(-25 400 100)" fill="#c8c0e8" filter="url(#milkyBlur)" opacity="0.35">
