    <ellipse cx="350" cy="175" rx="80" ry="2" fill="#c49530" opacity="0.25" />
    <ellipse cx="600" cy="150" rx="70" ry="2.5" fill="#c49530" opacity="0.3" />
    <ellipse cx="700" cy="180" rx="50" ry="2" fill="#c49530" opacity="0.2" />

    
    <path d="M0,120 Q100,115 200,122 Q300,128 400,118 Q500,112 600,122 Q700,130 800,118 L800,135 Q700,142 600,134 Q500,126 400,135 Q300,143 200,134 Q100,126 0,135 Z" fill="#b89040" opacity="0.5" />

    
    <circle cx="650" cy="40" r="28" fill="url(#sunGrad)" />
    <circle cx="650" cy="40" r="22" fill="#fff8d0" opacity="0.8" />

    
    <circle cx="650" cy="40" r="50" fill="#ffe040" opacity="0.15" />

    
    <g>
