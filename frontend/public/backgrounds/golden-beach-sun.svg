<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8fcb" />
      <stop offset="55%" stop-color="#5bb8e8" />
      <stop offset="80%" stop-color="#a8daf0" />
      <stop offset="100%" stop-color="#f5e6a0" />
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7ab5" />
      <stop offset="100%" stop-color="#5bc0de" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c860" />
      <stop offset="50%" stop-color="#d4a840" />
      <stop offset="100%" stop-color="#c49530" />
    </linearGradient>
    <radialGradient id="sunGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffbe0" />
      <stop offset="40%" stop-color="#ffe040" />
      <stop offset="100%" stop-color="#ffb800" />
    </radialGradient>
  </defs>

  <g id="background-main">
    
    <rect x="0" y="0" width="800" height="200" fill="url(#skyGrad)" />

    
    <rect x="0" y="90" width="800" height="30" fill="url(#oceanGrad)" opacity="0.9" />

    
    <ellipse cx="400" cy="115" rx="500" ry="25" fill="#3a8fc2" opacity="0.7" />

    
    <path d="M0,110 Q50,100 100,108 Q150,116 200,106 Q250,96 300,108 Q350,118 400,105 Q450,95 500,108 Q550,118 600,106 Q650,96 700,108 Q750,118 800,105 L800,120 L0,120 Z" fill="#4da8d4" opacity="0.8" />
    <path d="M0,115 Q60,108 120,115 Q180,122 240,112 Q300,104 360,115 Q420,124 480,112 Q540,102 600,115 Q660,125 720,112 Q780,102 800,112 L800,125 L0,125 Z" fill="#6fc0e0" opacity="0.7" />

    
    <path d="M0,118 Q40,113 80,118 Q120,123 160,116 Q200,110 240,118 Q280,125 320,116 Q360,108 400,118 Q440,126 480,116 Q520,108 560,118 Q600,126 640,116 Q680,108 720,118 Q760,126 800,116" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    <path d="M0,122 Q50,117 100,122 Q150,127 200,120 Q250,114 300,122 Q350,129 400,120 Q450,112 500,122 Q550,130 600,120 Q650,112 700,122 Q750,130 800,120" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />

    
    <path d="M0,120 Q100,115 200,122 Q300,128 400,118 Q500,112 600,122 Q700,130 800,118 L800,200 L0,200 Z" fill="url(#sandGrad)" />

    
