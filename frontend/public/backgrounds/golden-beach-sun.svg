      <ellipse cx="130" cy="32" rx="30" ry="9" fill="#ffffff" opacity="0.5" />
    </g>
    <g>
      <ellipse cx="450" cy="50" rx="45" ry="10" fill="#ffffff" opacity="0.5" />
      <ellipse cx="470" cy="46" rx="30" ry="8" fill="#ffffff" opacity="0.4" />
