    </g>

    
    
    <path d="M120,165 Q125,158 130,163 Q128,170 120,168 Z" fill="#f0d8b0" stroke="#c49530" stroke-width="0.5" />
    <path d="M122,164 Q125,161 127,164" fill="none" stroke="#c49530" stroke-width="0.3" />

    
    <path d="M280,180 L285,172 L290,180 Z" fill="#e8c8a0" stroke="#b08040" stroke-width="0.5" />
    <path d="M282,178 L285,173 L288,178" fill="none" stroke="#b08040" stroke-width="0.3" />

    
    <ellipse cx="500" cy="170" rx="5" ry="3" fill="#f5e0c0" stroke="#c49530" stroke-width="0.5" />
    <line x1="497" y1="170" x2="503" y2="170" stroke="#c49530" stroke-width="0.3" />

    
    <path d="M680,175 Q683,168 688,172 Q686,178 680,177 Z" fill="#e0c090" stroke="#a07030" stroke-width="0.5" />

    
    <path d="M400,185 Q403,179 408,183 Q405,188 400,187 Z" fill="#f0d0a0" stroke="#b89040" stroke-width="0.5" />

    
    <circle cx="200" cy="155" r="2" fill="#a08060" opacity="0.6" />
    <circle cx="550" cy="165" r="1.5" fill="#908070" opacity="0.5" />
    <circle cx="350" cy="190" r="2.5" fill="#a09070" opacity="0.4" />
    <circle cx="720" cy="160" r="1.8" fill="#a08060" opacity="0.5" />

    
    <ellipse cx="180" cy="145" rx="18" ry="8" fill="#a8d8f0" opacity="0.7" />
    <ellipse cx="180" cy="145" rx="14" ry="6" fill="#b8e4f8" opacity="0.5" />

    
    <ellipse cx="580" cy="155" rx="14" ry="6" fill="#a0d0e8" opacity="0.6" />
    <ellipse cx="580" cy="155" rx="10" ry="4" fill="#b0e0f0" opacity="0.4" />

    
    <ellipse cx="420" cy="160" rx="8" ry="4" fill="#a8d8f0" opacity="0.5" />

    
    <g id="background-animated-part">
      
      <circle cx="650" cy="40" r="38" fill="none" stroke="#ffe840" stroke-width="4">
        <animate attributeName="opacity" values="0.3;0.85;0.3" dur="3s" repeatCount="indefinite" />
      </circle>

      
      <circle cx="650" cy="40" r="55" fill="none" stroke="#ffcc20" stroke-width="6">
        <animate attributeName="opacity" values="0.15;0.6;0.15" dur="4.5s" begin="1s" repeatCount="indefinite" />
      </circle>

      
      <ellipse cx="180" cy="145" rx="16" ry="7" opacity="0.6">
        <animate attributeName="fill" values="#a8d8f0;#d4f0ff;#a8d8f0" dur="3s" repeatCount="indefinite" />
      </ellipse>

      
      <path d="M0,120 Q60,113 120,120 Q180,127 240,118 Q300,110 360,120 Q420,128 480,118 Q540,110 600,120 Q660,128 720,118 Q780,110 800,118" fill="none" stroke="#ffffff" stroke-width="3">
        <animate attributeName="opacity" values="0.5;1.0;0.5" dur="2.5s" repeatCount="indefinite" />
      </path>

      
      <g>
