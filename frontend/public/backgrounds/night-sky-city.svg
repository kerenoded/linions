<svg xmlns="http://www.w3.org/2000/svg" id="background-root" viewBox="0 0 800 200">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a1a4a" />
      <stop offset="60%" stop-color="#0f0f30" />
      <stop offset="100%" stop-color="#0a0a20" />
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" rx="50%" ry="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#ffe8a0" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#ffcc55" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0d0d2b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="skyVertical" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1e" />
      <stop offset="50%" stop-color="#0d0d2b" />
      <stop offset="85%" stop-color="#1a1a50" />
      <stop offset="100%" stop-color="#2a2060" />
    </linearGradient>
  </defs>

  <g id="background-main">
    
