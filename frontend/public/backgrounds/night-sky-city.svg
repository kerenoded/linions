      </circle>

      
      <ellipse cx="400" cy="95" rx="220" ry="90" fill="url(#glowGrad)" opacity="0.5">
        <animate attributeName="opacity" values="0.25;0.7;0.25" dur="4s" repeatCount="indefinite" />
