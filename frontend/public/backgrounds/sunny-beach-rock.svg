        <animate attributeName="opacity" values="0.7;1.0;0.7" dur="6s" repeatCount="indefinite" />
      </g>

      
      <g opacity="0.1">
        <circle cx="250" cy="150" r="2" fill="#FFFDE0" />
        <circle cx="380" cy="175" r="1.5" fill="#FFFDE0" />
        <circle cx="550" cy="160" r="2" fill="#FFFDE0" />
        <circle cx="150" cy="165" r="1.5" fill="#FFFDE0" />
        <circle cx="650" cy="155" r="2" fill="#FFFDE0" />
        <circle cx="720" cy="175" r="1.5" fill="#FFFDE0" />
        <circle cx="80" cy="180" r="2" fill="#FFFDE0" />
        <circle cx="430" cy="185" r="1.5" fill="#FFFDE0" />
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite" />
