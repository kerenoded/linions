<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#aaf4ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#88eeff" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#44ddee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22aacc" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#aaf4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#44ddee" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00eeff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#00eeff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00eeff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00ccdd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#009999" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="bumpGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaf4ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#88eeff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#44ddee" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="bumpGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccf8ff" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#88eeff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ddee" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="vaporBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind creature -->
  <ellipse cx="103" cy="100" rx="80" ry="75" fill="url(#outerGlow)"/>
  <ellipse cx="103" cy="105" rx="65" ry="60" fill="url(#outerGlow)"/>

  <!-- Vapor trails at bottom (fading downward) -->
  <g filter="url(#vaporBlur)" opacity="0.5">
    <ellipse cx="80" cy="155" rx="12" ry="18" fill="#44ddee" opacity="0.3"/>
    <ellipse cx="95" cy="162" rx="10" ry="22" fill="#88eeff" opacity="0.2"/>
    <ellipse cx="110" cy="158" rx="14" ry="20" fill="#44ddee" opacity="0.25"/>
    <ellipse cx="125" cy="165" rx="9" ry="18" fill="#88eeff" opacity="0.15"/>
    <ellipse cx="88" cy="170" rx="8" ry="15" fill="#aaf4ff" opacity="0.12"/>
    <ellipse cx="105" cy="175" rx="10" ry="16" fill="#44ddee" opacity="0.1"/>
    <ellipse cx="118" cy="178" rx="7" ry="12" fill="#88eeff" opacity="0.08"/>
    <ellipse cx="75" cy="168" rx="6" ry="14" fill="#aaf4ff" opacity="0.1"/>
    <ellipse cx="100" cy="185" rx="8" ry="10" fill="#44ddee" opacity="0.06"/>
  </g>

  <!-- More wispy trails -->
  <g filter="url(#softBlur)" opacity="0.4">
    <path d="M78 145 Q72 165 68 180" stroke="#88eeff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M95 148 Q90 170 88 190" stroke="#aaf4ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M112 147 Q115 168 118 188" stroke="#88eeff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M128 142 Q133 162 135 178" stroke="#aaf4ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Main cloud body group -->
  <g id="character-body">
    <!-- Base cloud shape - deepest layer -->
    <ellipse cx="103" cy="105" rx="58" ry="48" fill="#44ddee" opacity="0.35" filter="url(#softBlur)"/>

    <!-- Bottom puffy bumps -->
    <ellipse cx="72" cy="140" rx="22" ry="16" fill="url(#bumpGlow1)" opacity="0.6"/>
    <ellipse cx="103" cy="145" rx="24" ry="15" fill="url(#bumpGlow1)" opacity="0.55"/>
    <ellipse cx="132" cy="138" rx="20" ry="14" fill="url(#bumpGlow1)" opacity="0.5"/>

    <!-- Left side bumps -->
    <ellipse cx="52" cy="105" rx="18" ry="20" fill="url(#bumpGlow2)" opacity="0.6"/>
    <ellipse cx="55" cy="82" rx="16" ry="17" fill="url(#bumpGlow2)" opacity="0.55"/>
    <ellipse cx="48" cy="120" rx="15" ry="16" fill="url(#bumpGlow2)" opacity="0.5"/>

    <!-- Right side bumps -->
    <ellipse cx="152" cy="100" rx="17" ry="19" fill="url(#bumpGlow2)" opacity="0.6"/>
    <ellipse cx="148" cy="78" rx="15" ry="16" fill="url(#bumpGlow2)" opacity="0.55"/>
    <ellipse cx="155" cy="118" rx="14" ry="15" fill="url(#bumpGlow2)" opacity="0.5"/>

    <!-- Main body layers - translucent depth -->
    <ellipse cx="103" cy="108" rx="52" ry="42" fill="url(#bodyGlow)"/>
    <ellipse cx="100" cy="105" rx="46" ry="38" fill="url(#innerGlow)"/>

    <!-- Top cloud bumps - classic cumulus silhouette -->
    <ellipse cx="78" cy="62" rx="22" ry="20" fill="url(#bumpGlow1)" opacity="0.8"/>
    <ellipse cx="105" cy="55" rx="26" ry="23" fill="url(#bumpGlow1)" opacity="0.85"/>
    <ellipse cx="130" cy="60" rx="21" ry="19" fill="url(#bumpGlow1)" opacity="0.75"/>
    <ellipse cx="60" cy="72" rx="18" ry="16" fill="url(#bumpGlow2)" opacity="0.7"/>
    <ellipse cx="145" cy="70" rx="17" ry="15" fill="url(#bumpGlow2)" opacity="0.65"/>
    <ellipse cx="92" cy="50" rx="20" ry="18" fill="url(#bumpGlow2)" opacity="0.7"/>
    <ellipse cx="118" cy="52" rx="19" ry="17" fill="url(#bumpGlow2)" opacity="0.7"/>

    <!-- Additional highlight layers on top bumps -->
    <ellipse cx="105" cy="53" rx="18" ry="15" fill="#ccf8ff" opacity="0.3"/>
    <ellipse cx="80" cy="60" rx="14" ry="12" fill="#ccf8ff" opacity="0.25"/>
    <ellipse cx="128" cy="58" rx="13" ry="11" fill="#ccf8ff" opacity="0.2"/>

    <!-- Swirling white energy patterns inside body -->
    <g filter="url(#softBlur)" opacity="0.35">
      <path d="M75 95 Q85 85 100 90 Q115 95 110 108 Q105 120 90 115 Q78 110 75 95Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
      <path d="M95 80 Q110 75 125 85 Q135 95 125 105 Q115 112 105 105" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.5"/>
      <path d="M70 110 Q80 100 95 105 Q105 110 100 122 Q92 130 80 125 Q68 118 70 110Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
      <path d="M110 95 Q125 88 138 98 Q142 108 132 115 Q120 118 112 110" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.45"/>
      <path d="M85 115 Q95 108 108 115 Q115 125 105 132" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
    </g>

    <!-- Additional swirl details -->
    <g opacity="0.25">
      <path d="M82 88 C90 82 100 86 95 95" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M115 92 C125 86 132 94 126 102" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M90 120 C100 114 108 120 102 128" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Floating glowing particles -->
    <g filter="url(#glowFilter)">
      <circle cx="78" cy="88" r="1.8" fill="url(#particleGlow)"/>
      <circle cx="120" cy="82" r="1.5" fill="url(#particleGlow)"/>
      <circle cx="95" cy="72" r="1.3" fill="url(#particleGlow)"/>
      <circle cx="132" cy="95" r="1.6" fill="url(#particleGlow)"/>
      <circle cx="68" cy="108" r="1.2" fill="url(#particleGlow)"/>
      <circle cx="110" cy="120" r="1.4" fill="url(#particleGlow)"/>
      <circle cx="85" cy="128" r="1.1" fill="url(#particleGlow)"/>
      <circle cx="140" cy="108" r="1.3" fill="url(#particleGlow)"/>
      <circle cx="75" cy="75" r="1" fill="url(#particleGlow)"/>
      <circle cx="125" cy="115" r="1.5" fill="url(#particleGlow)"/>
      <circle cx="100" cy="100" r="1.7" fill="url(#particleGlow)"/>
      <circle cx="88" cy="105" r="1" fill="url(#particleGlow)"/>
      <circle cx="115" cy="70" r="1.2" fill="url(#particleGlow)"/>
      <circle cx="65" cy="95" r="0.9" fill="url(#particleGlow)"/>
      <circle cx="138" cy="85" r="1.1" fill="url(#particleGlow)"/>
    </g>

    <!-- Soft highlight on top for 3D feel -->
    <ellipse cx="98" cy="60" rx="30" ry="15" fill="#ffffff" opacity="0.12"/>
    <ellipse cx="100" cy="55" rx="20" ry="10" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- Left Eye -->
  <g id="character-eye-left">
    <!-- Eye shadow -->
    <ellipse cx="88" cy="92" rx="14" ry="15" fill="#225566" opacity="0.15"/>
    <!-- White sclera -->
    <ellipse cx="87" cy="90" rx="13" ry="14" fill="#ffffff"/>
    <!-- Subtle sclera shading -->
    <ellipse cx="87" cy="93" rx="11" ry="10" fill="#eef8ff" opacity="0.5"/>
    <!-- Dark iris -->
    <ellipse cx="89" cy="90" rx="8" ry="9" fill="#113344"/>
    <!-- Cyan glowing pupil -->
    <ellipse cx="90" cy="89" rx="4.5" ry="5" fill="url(#eyeGlow)"/>
    <!-- Pupil inner glow -->
    <ellipse cx="90" cy="89" rx="2.5" ry="3" fill="#00eeff" opacity="0.9"/>
    <!-- Main highlight -->
    <circle cx="84" cy="85" r="3" fill="#ffffff" opacity="0.95"/>
    <!-- Secondary highlight -->
    <circle cx="92" cy="94" r="1.5" fill="#ffffff" opacity="0.6"/>
    <!-- Eye glow effect -->
    <ellipse cx="89" cy="89" rx="5" ry="5.5" fill="#00eeff" opacity="0.15" filter="url(#softBlur)"/>
  </g>

  <!-- Right Eye -->
  <g id="character-eye-right">
    <!-- Eye shadow -->
    <ellipse cx="120" cy="90" rx="14" ry="15" fill="#225566" opacity="0.15"/>
    <!-- White sclera -->
    <ellipse cx="119" cy="88" rx="13" ry="14" fill="#ffffff"/>
    <!-- Subtle sclera shading -->
    <ellipse cx="119" cy="91" rx="11" ry="10" fill="#eef8ff" opacity="0.5"/>
    <!-- Dark iris -->
    <ellipse cx="121" cy="88" rx="8" ry="9" fill="#113344"/>
    <!-- Cyan glowing pupil -->
    <ellipse cx="122" cy="87" rx="4.5" ry="5" fill="url(#eyeGlow)"/>
    <!-- Pupil inner glow -->
    <ellipse cx="122" cy="87" rx="2.5" ry="3" fill="#00eeff" opacity="0.9"/>
    <!-- Main highlight -->
    <circle cx="116" cy="83" r="3" fill="#ffffff" opacity="0.95"/>
    <!-- Secondary highlight -->
    <circle cx="124" cy="92" r="1.5" fill="#ffffff" opacity="0.6"/>
    <!-- Eye glow effect -->
    <ellipse cx="121" cy="87" rx="5" ry="5.5" fill="#00eeff" opacity="0.15" filter="url(#softBlur)"/>
  </g>

  <!-- Cute smile -->
  <path d="M96 108 Q104 116 114 108" fill="none" stroke="#226677" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Smile highlight -->
  <path d="M98 109 Q104 115 112 109" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>

  <!-- Cute blush spots -->
  <ellipse cx="78" cy="104" rx="7" ry="4" fill="#ff88aa" opacity="0.12"/>
  <ellipse cx="132" cy="102" rx="7" ry="4" fill="#ff88aa" opacity="0.1"/>

  <!-- Final overlay glow on entire creature -->
  <ellipse cx="103" cy="95" rx="55" ry="50" fill="#aaf4ff" opacity="0.05"/>
</svg>