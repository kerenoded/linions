<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer golden aura glow -->
  <defs>
    <radialGradient id="aura-glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#ffeeaa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffcc44" stop-opacity="0.25"/>
      <stop offset="80%" stop-color="#ff8822" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff8822" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffffcc" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ffdd66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body-grad" cx="48%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#ffeeaa"/>
      <stop offset="35%" stop-color="#ffcc44"/>
      <stop offset="65%" stop-color="#ffaa33"/>
      <stop offset="100%" stop-color="#ff8822"/>
    </radialGradient>
    <radialGradient id="inner-layer" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#ffeeaa" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffcc44" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8822" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="tiny-blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background aura -->
  <ellipse cx="103" cy="95" rx="90" ry="85" fill="url(#aura-glow)" filter="url(#glow-filter)"/>

  <!-- Main character body group -->
  <g id="character-body">
    <!-- Misty bottom trails -->
    <ellipse cx="75" cy="145" rx="14" ry="22" fill="#ffaa33" opacity="0.2" filter="url(#soft-blur)"/>
    <ellipse cx="103" cy="150" rx="18" ry="28" fill="#ffcc44" opacity="0.25" filter="url(#soft-blur)"/>
    <ellipse cx="130" cy="147" rx="12" ry="20" fill="#ff8822" opacity="0.18" filter="url(#soft-blur)"/>
    <ellipse cx="90" cy="155" rx="10" ry="18" fill="#ffaa33" opacity="0.15" filter="url(#soft-blur)"/>
    <ellipse cx="115" cy="153" rx="8" ry="16" fill="#ffcc44" opacity="0.15" filter="url(#soft-blur)"/>

    <!-- Wispy trail tendrils -->
    <path d="M80 130 Q75 155 68 170" stroke="#ffaa33" stroke-width="4" fill="none" opacity="0.2" stroke-linecap="round" filter="url(#tiny-blur)"/>
    <path d="M100 135 Q98 160 95 178" stroke="#ffcc44" stroke-width="5" fill="none" opacity="0.2" stroke-linecap="round" filter="url(#tiny-blur)"/>
    <path d="M120 132 Q125 158 130 172" stroke="#ff8822" stroke-width="3.5" fill="none" opacity="0.18" stroke-linecap="round" filter="url(#tiny-blur)"/>
    <path d="M108 138 Q110 162 112 180" stroke="#ffeeaa" stroke-width="3" fill="none" opacity="0.15" stroke-linecap="round" filter="url(#tiny-blur)"/>

    <!-- Base cloud shape - deepest layer -->
    <path d="M45 105 Q38 85 50 70 Q55 58 70 55 Q78 42 95 40 Q108 35 120 42 Q135 38 148 50 Q162 55 165 72 Q172 82 168 100 Q170 115 158 125 Q150 135 135 138 Q120 142 105 140 Q85 143 70 138 Q55 135 48 120 Z" fill="url(#body-grad)" filter="url(#tiny-blur)"/>

    <!-- Second cloud layer - lighter -->
    <path d="M52 102 Q46 86 56 74 Q62 62 76 60 Q84 48 98 46 Q112 42 124 48 Q136 44 146 54 Q156 60 158 75 Q164 85 160 98 Q162 112 152 120 Q142 130 128 132 Q114 135 100 133 Q82 136 72 130 Q58 126 52 114 Z" fill="#ffcc44" opacity="0.6"/>

    <!-- Third cloud layer - warm highlight -->
    <path d="M60 98 Q55 84 63 75 Q68 66 80 64 Q86 54 98 52 Q110 48 120 54 Q130 50 140 58 Q148 64 150 76 Q155 84 152 96 Q154 108 146 115 Q138 122 126 124 Q112 127 100 125 Q86 128 76 122 Q64 118 60 108 Z" fill="url(#inner-layer)"/>

    <!-- Core glow -->
    <ellipse cx="103" cy="90" rx="32" ry="28" fill="url(#core-glow)" filter="url(#soft-blur)"/>

    <!-- Bright center core -->
    <ellipse cx="103" cy="88" rx="15" ry="13" fill="#ffffff" opacity="0.4" filter="url(#soft-blur)"/>
    <ellipse cx="103" cy="88" rx="8" ry="7" fill="#ffffee" opacity="0.5" filter="url(#tiny-blur)"/>

    <!-- Swirling energy patterns -->
    <path d="M75 85 Q85 75 100 80 Q115 85 110 95" stroke="#ffeeaa" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M90 70 Q105 65 118 72 Q128 80 120 90" stroke="#ffdd66" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M70 95 Q80 105 95 100 Q108 95 115 102" stroke="#ffcc44" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M85 95 Q95 88 108 92 Q118 96 112 105" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.25" stroke-linecap="round"/>
    <path d="M95 78 Q103 72 112 78" stroke="#ffeeaa" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>

    <!-- Floating golden particles inside -->
    <circle cx="80" cy="78" r="2" fill="#ffdd66" opacity="0.6"/>
    <circle cx="120" cy="82" r="1.8" fill="#ffeeaa" opacity="0.55"/>
    <circle cx="95" cy="68" r="1.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="112" cy="72" r="1.3" fill="#ffdd66" opacity="0.5"/>
    <circle cx="88" cy="100" r="1.6" fill="#ffcc44" opacity="0.45"/>
    <circle cx="115" cy="98" r="1.4" fill="#ffeeaa" opacity="0.5"/>
    <circle cx="100" cy="110" r="1.2" fill="#ffdd66" opacity="0.4"/>
    <circle cx="75" cy="92" r="1.1" fill="#ffffff" opacity="0.35"/>
    <circle cx="130" cy="88" r="1.3" fill="#ffcc44" opacity="0.4"/>
    <circle cx="105" cy="60" r="1" fill="#ffeeaa" opacity="0.45"/>
    <circle cx="70" cy="108" r="1" fill="#ffdd66" opacity="0.35"/>
    <circle cx="135" cy="100" r="0.9" fill="#ffaa33" opacity="0.35"/>

    <!-- Cloud bumps highlight details -->
    <ellipse cx="68" cy="65" rx="12" ry="10" fill="#ffeeaa" opacity="0.2"/>
    <ellipse cx="95" cy="45" rx="14" ry="8" fill="#ffeeaa" opacity="0.25"/>
    <ellipse cx="130" cy="50" rx="11" ry="9" fill="#ffeeaa" opacity="0.18"/>
    <ellipse cx="155" cy="72" rx="10" ry="11" fill="#ffeeaa" opacity="0.15"/>
    <ellipse cx="55" cy="88" rx="9" ry="12" fill="#ffeeaa" opacity="0.15"/>

    <!-- Outer ember particles -->
    <circle cx="40" cy="72" r="2.2" fill="#ff8822" opacity="0.5" filter="url(#tiny-blur)"/>
    <circle cx="170" cy="65" r="1.8" fill="#ffaa33" opacity="0.45" filter="url(#tiny-blur)"/>
    <circle cx="35" cy="100" r="1.5" fill="#ffcc44" opacity="0.4" filter="url(#tiny-blur)"/>
    <circle cx="172" cy="95" r="2" fill="#ff8822" opacity="0.4" filter="url(#tiny-blur)"/>
    <circle cx="55" cy="50" r="1.8" fill="#ffaa33" opacity="0.35" filter="url(#tiny-blur)"/>
    <circle cx="155" cy="42" r="1.5" fill="#ffcc44" opacity="0.4" filter="url(#tiny-blur)"/>
    <circle cx="45" cy="125" r="1.6" fill="#ff8822" opacity="0.3" filter="url(#tiny-blur)"/>
    <circle cx="160" cy="120" r="1.4" fill="#ffaa33" opacity="0.35" filter="url(#tiny-blur)"/>
    <circle cx="80" cy="38" r="1.3" fill="#ffdd66" opacity="0.4" filter="url(#tiny-blur)"/>
    <circle cx="140" cy="35" r="1.6" fill="#ff8822" opacity="0.35" filter="url(#tiny-blur)"/>
    <circle cx="30" cy="88" r="1.2" fill="#ffcc44" opacity="0.3" filter="url(#tiny-blur)"/>
    <circle cx="175" cy="82" r="1.3" fill="#ffaa33" opacity="0.3" filter="url(#tiny-blur)"/>
    <circle cx="62" cy="140" r="1.4" fill="#ff8822" opacity="0.25" filter="url(#tiny-blur)"/>
    <circle cx="145" cy="135" r="1.2" fill="#ffcc44" opacity="0.25" filter="url(#tiny-blur)"/>
  </g>

  <!-- Left eye -->
  <g id="character-eye-left">
    <!-- Eye shadow -->
    <ellipse cx="88" cy="90" rx="13" ry="14" fill="#cc7711" opacity="0.2"/>
    <!-- White sclera -->
    <ellipse cx="88" cy="88" rx="12" ry="13" fill="#ffffff"/>
    <!-- Dark brown iris -->
    <ellipse cx="90" cy="88" rx="7.5" ry="8.5" fill="#332200"/>
    <!-- Amber glowing pupil outer -->
    <ellipse cx="90" cy="88" rx="4.5" ry="5" fill="#ffaa44"/>
    <!-- Amber glowing pupil inner -->
    <ellipse cx="90" cy="87" rx="3" ry="3.2" fill="#ffdd66"/>
    <!-- Bright center -->
    <ellipse cx="90" cy="87" rx="1.2" ry="1.3" fill="#ffeecc" opacity="0.8"/>
    <!-- White highlight large -->
    <ellipse cx="86" cy="84" rx="2.8" ry="3.2" fill="#ffffff" opacity="0.85"/>
    <!-- White highlight small -->
    <ellipse cx="93" cy="92" rx="1.2" ry="1.5" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Right eye -->
  <g id="character-eye-right">
    <!-- Eye shadow -->
    <ellipse cx="118" cy="88" rx="13" ry="14" fill="#cc7711" opacity="0.2"/>
    <!-- White sclera -->
    <ellipse cx="118" cy="86" rx="12" ry="13" fill="#ffffff"/>
    <!-- Dark brown iris -->
    <ellipse cx="120" cy="86" rx="7.5" ry="8.5" fill="#332200"/>
    <!-- Amber glowing pupil outer -->
    <ellipse cx="120" cy="86" rx="4.5" ry="5" fill="#ffaa44"/>
    <!-- Amber glowing pupil inner -->
    <ellipse cx="120" cy="85" rx="3" ry="3.2" fill="#ffdd66"/>
    <!-- Bright center -->
    <ellipse cx="120" cy="85" rx="1.2" ry="1.3" fill="#ffeecc" opacity="0.8"/>
    <!-- White highlight large -->
    <ellipse cx="116" cy="82" rx="2.8" ry="3.2" fill="#ffffff" opacity="0.85"/>
    <!-- White highlight small -->
    <ellipse cx="123" cy="90" rx="1.2" ry="1.5" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Mouth - small happy smile -->
  <g id="character-mouth">
    <path d="M98 104 Q105 112 114 104" stroke="#884400" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Tiny tongue/warmth hint -->
    <ellipse cx="106" cy="107" rx="3.5" ry="2" fill="#ff8855" opacity="0.4"/>
  </g>

  <!-- Cheek blush -->
  <ellipse cx="76" cy="100" rx="7" ry="4.5" fill="#ffaa44" opacity="0.3" filter="url(#tiny-blur)"/>
  <ellipse cx="136" cy="98" rx="7" ry="4.5" fill="#ffaa44" opacity="0.3" filter="url(#tiny-blur)"/>

  <!-- Top highlight on cloud -->
  <ellipse cx="95" cy="48" rx="18" ry="6" fill="#ffeecc" opacity="0.3" filter="url(#tiny-blur)"/>
  <ellipse cx="120" cy="46" rx="12" ry="5" fill="#ffffff" opacity="0.15" filter="url(#tiny-blur)"/>
</svg>