<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#aaf4ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#88eeff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#44ddee" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ddee" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8f0"/>
    </radialGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ffff"/>
      <stop offset="40%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#006688"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blurSmall">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <g id="linai">
    <g id="linai-trails">
      <!-- Wispy vapor trails -->
      <path d="M70 140 Q65 155 55 170 Q50 180 48 190" stroke="#44ddee" stroke-width="4" fill="none" opacity="0.1" stroke-linecap="round" filter="url(#blur2)"/>
      <path d="M90 145 Q85 160 80 175 Q78 185 75 195" stroke="#88eeff" stroke-width="5" fill="none" opacity="0.12" stroke-linecap="round" filter="url(#blur2)"/>
      <path d="M110 148 Q112 165 108 180 Q106 190 105 200" stroke="#44ddee" stroke-width="6" fill="none" opacity="0.1" stroke-linecap="round" filter="url(#blur2)"/>
      <path d="M130 142 Q135 158 140 172 Q142 182 145 192" stroke="#88eeff" stroke-width="4" fill="none" opacity="0.08" stroke-linecap="round" filter="url(#blur2)"/>
      <path d="M100 150 Q98 168 95 185 Q93 195 92 200" stroke="#aaf4ff" stroke-width="7" fill="none" opacity="0.15" stroke-linecap="round" filter="url(#blur3)"/>
      <path d="M75 148 Q70 165 68 182 Q66 192 64 200" stroke="#44ddee" stroke-width="3" fill="none" opacity="0.08" stroke-linecap="round" filter="url(#blur3)"/>
      <path d="M120 146 Q125 162 128 178 Q130 188 132 198" stroke="#aaf4ff" stroke-width="5" fill="none" opacity="0.1" stroke-linecap="round" filter="url(#blur2)"/>

      <!-- Dissolving bottom wisps -->
      <ellipse cx="85" cy="150" rx="20" ry="8" fill="#44ddee" opacity="0.15" filter="url(#blur2)"/>
      <ellipse cx="115" cy="148" rx="18" ry="7" fill="#88eeff" opacity="0.12" filter="url(#blur2)"/>
      <ellipse cx="100" cy="155" rx="25" ry="10" fill="#44ddee" opacity="0.1" filter="url(#blur3)"/>
    </g>

    <g id="linai-body">
      <!-- Outer ambient glow -->
      <ellipse cx="108" cy="90" rx="70" ry="60" fill="#44ddee" opacity="0.15" filter="url(#blur3)"/>

      <!-- Main body - deepest layer -->
      <path d="M55 95 Q45 60 70 38 Q85 28 105 25 Q130 22 148 38 Q165 55 160 80 Q158 100 150 120 Q140 142 120 148 Q100 155 80 148 Q60 140 55 120 Z" fill="#44ddee" opacity="0.35" filter="url(#blur1)"/>

      <!-- Body layer 2 -->
      <path d="M60 92 Q52 62 75 42 Q90 32 108 30 Q132 28 147 42 Q160 58 156 82 Q153 102 145 118 Q136 138 118 143 Q100 148 82 142 Q65 135 60 112 Z" fill="#88eeff" opacity="0.4"/>

      <!-- Body layer 3 - brighter core -->
      <path d="M68 90 Q62 68 80 50 Q92 40 108 38 Q128 36 140 48 Q152 62 148 82 Q145 100 138 114 Q130 130 115 135 Q100 140 87 133 Q72 125 68 108 Z" fill="#aaf4ff" opacity="0.5"/>

      <!-- Translucent depth ellipses -->
      <ellipse cx="95" cy="75" rx="35" ry="28" fill="#aaf4ff" opacity="0.3"/>
      <ellipse cx="115" cy="85" rx="28" ry="22" fill="#88eeff" opacity="0.25"/>
      <ellipse cx="85" cy="100" rx="22" ry="18" fill="#44ddee" opacity="0.2"/>
      <ellipse cx="120" cy="65" rx="20" ry="16" fill="#aaf4ff" opacity="0.35"/>

      <!-- Inner glow center -->
      <ellipse cx="105" cy="80" rx="30" ry="25" fill="url(#innerGlow)" opacity="0.6"/>

      <!-- Puffy bumps on top -->
      <ellipse cx="80" cy="40" rx="18" ry="14" fill="#aaf4ff" opacity="0.4" filter="url(#blurSmall)"/>
      <ellipse cx="105" cy="30" rx="20" ry="12" fill="#88eeff" opacity="0.45" filter="url(#blurSmall)"/>
      <ellipse cx="130" cy="38" rx="16" ry="13" fill="#aaf4ff" opacity="0.35" filter="url(#blurSmall)"/>

      <!-- Puffy bump on right (facing direction) -->
      <ellipse cx="155" cy="70" rx="12" ry="18" fill="#88eeff" opacity="0.3" filter="url(#blurSmall)"/>
      <ellipse cx="150" cy="55" rx="10" ry="12" fill="#aaf4ff" opacity="0.25" filter="url(#blurSmall)"/>

      <!-- Subtle top highlight on body for depth -->
      <ellipse cx="100" cy="35" rx="30" ry="10" fill="#ffffff" opacity="0.12" filter="url(#blur1)"/>

      <!-- Outer edge glow for ghostly effect -->
      <path d="M55 95 Q45 60 70 38 Q85 28 105 25 Q130 22 148 38 Q165 55 160 80 Q158 100 150 120 Q140 142 120 148 Q100 155 80 148 Q60 140 55 120 Z" fill="none" stroke="#aaf4ff" stroke-width="2" opacity="0.2" filter="url(#blur1)"/>
    </g>

    <g id="linai-particles">
      <!-- Floating glowing particles inside body -->
      <circle cx="88" cy="68" r="2" fill="#ffffff" opacity="0.7" filter="url(#blurSmall)"/>
      <circle cx="88" cy="68" r="1" fill="#ffffff" opacity="0.9"/>
      <circle cx="120" cy="75" r="1.8" fill="#ffffff" opacity="0.6" filter="url(#blurSmall)"/>
      <circle cx="120" cy="75" r="0.8" fill="#ffffff" opacity="0.9"/>
      <circle cx="100" cy="110" r="1.5" fill="#aaf4ff" opacity="0.7" filter="url(#blurSmall)"/>
      <circle cx="100" cy="110" r="0.7" fill="#ffffff" opacity="0.8"/>
      <circle cx="130" cy="95" r="1.8" fill="#ffffff" opacity="0.5" filter="url(#blurSmall)"/>
      <circle cx="130" cy="95" r="0.8" fill="#ffffff" opacity="0.8"/>
      <circle cx="78" cy="88" r="1.3" fill="#88eeff" opacity="0.6" filter="url(#blurSmall)"/>
      <circle cx="78" cy="88" r="0.6" fill="#ffffff" opacity="0.9"/>
      <circle cx="112" cy="55" r="1.5" fill="#ffffff" opacity="0.5" filter="url(#blurSmall)"/>
      <circle cx="112" cy="55" r="0.7" fill="#ffffff" opacity="0.8"/>
      <circle cx="140" cy="68" r="1.2" fill="#aaf4ff" opacity="0.6" filter="url(#blurSmall)"/>
      <circle cx="140" cy="68" r="0.5" fill="#ffffff" opacity="0.9"/>
      <circle cx="95" cy="125" r="1.4" fill="#ffffff" opacity="0.4" filter="url(#blurSmall)"/>
      <circle cx="95" cy="125" r="0.6" fill="#ffffff" opacity="0.7"/>
      <circle cx="75" cy="105" r="1" fill="#ffffff" opacity="0.5" filter="url(#blurSmall)"/>
      <circle cx="118" cy="120" r="1.2" fill="#88eeff" opacity="0.5" filter="url(#blurSmall)"/>
      <circle cx="135" cy="55" r="1" fill="#ffffff" opacity="0.6" filter="url(#blurSmall)"/>
      <circle cx="85" cy="50" r="1.3" fill="#ffffff" opacity="0.5" filter="url(#blurSmall)"/>
    </g>

    <g id="linai-mouth">
      <!-- Cute friendly mouth - small smile -->
      <path d="M112 98 Q118 104 125 100" stroke="#2299aa" stroke-width="1.8" fill="none" opacity="0.6" stroke-linecap="round"/>
    </g>

    <g id="linai-eye-left">
      <!-- Left eye (further from viewer, slightly smaller due to perspective) -->
      <ellipse cx="95" cy="72" rx="12" ry="14" fill="url(#eyeGrad)"/>
      <ellipse cx="95" cy="74" rx="11" ry="12" fill="#ddeeff" opacity="0.3"/>
      <ellipse cx="97" cy="73" rx="7" ry="8.5" fill="#113344"/>
      <ellipse cx="98" cy="73" rx="4" ry="5" fill="url(#pupilGlow)"/>
      <ellipse cx="98" cy="73" rx="3" ry="3.5" fill="#00eeff" opacity="0.8"/>
      <ellipse cx="93" cy="68" rx="3" ry="3.5" fill="#ffffff" opacity="0.95"/>
      <ellipse cx="100" cy="77" rx="1.5" ry="1.8" fill="#ffffff" opacity="0.6"/>
      <circle cx="98" cy="72" r="1.2" fill="#aaffff" opacity="0.7"/>
    </g>

    <g id="linai-eye-right">
      <!-- Right eye (closer to viewer, slightly larger, positioned more right) -->
      <ellipse cx="122" cy="70" rx="13" ry="15" fill="url(#eyeGrad)"/>
      <ellipse cx="122" cy="72" rx="12" ry="13" fill="#ddeeff" opacity="0.3"/>
      <ellipse cx="124" cy="71" rx="7.5" ry="9" fill="#113344"/>
      <ellipse cx="125" cy="71" rx="4.5" ry="5.5" fill="url(#pupilGlow)"/>
      <ellipse cx="125" cy="71" rx="3.2" ry="3.8" fill="#00eeff" opacity="0.8"/>
      <ellipse cx="120" cy="66" rx="3.2" ry="3.8" fill="#ffffff" opacity="0.95"/>
      <ellipse cx="127" cy="75" rx="1.6" ry="2" fill="#ffffff" opacity="0.6"/>
      <circle cx="125" cy="70" r="1.3" fill="#aaffff" opacity="0.7"/>
    </g>

    <g id="linai-inner-patterns">
      <!-- Swirling energy patterns inside body, below the eyes (y >= 100) -->
      <path d="M75 95 Q82 88 95 92 Q105 96 102 108 Q98 115 88 112 Q78 108 75 100" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
      <path d="M115 90 Q125 85 133 92 Q138 100 132 110 Q125 116 118 110" stroke="#88eeff" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
