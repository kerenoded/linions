name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            infra/package-lock.json
            proxy/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.lock pytest-mock

      - name: Install root Node dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install infrastructure dependencies
        run: npm --prefix infra ci

      - name: Install proxy dependencies
        run: npm --prefix proxy ci

      - name: Lint Python
        run: ruff check pipeline scripts

      - name: Lint TypeScript
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend bundles
        run: npm --prefix frontend run build

      - name: Validate published episode artifacts
        run: |
          node scripts/build-index.js
          git diff --exit-code -- episodes

      - name: Synth CDK stack
        run: ./infra/node_modules/.bin/cdk synth --quiet --output cdk.out

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run CDK tests
        run: pytest tests/cdk/ -v

      - name: Fail on macOS metadata files
        run: |
          if find . -name '.DS_Store' -print | grep -q .; then
            echo "Found .DS_Store files in the repository."
            find . -name '.DS_Store' -print
            exit 1
          fi
