* { margin: 0; padding: 0; box-sizing: border-box; }
body {

.model-card { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 220px; }

.model-card:hover img { transform: scale(1.08) translateY(-5px); }

.vs-badge { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: #8a4a2a; align-self: center; padding-bottom: 20px; }
