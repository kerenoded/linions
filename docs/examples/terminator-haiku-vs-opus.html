<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080808;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.page {
  width: 1080px;
  height: 1080px;
  position: absolute;
  overflow: hidden;
  transform-origin: top left;
  display: flex;
  flex-direction: column;
}

/* ── Background halves ── */
.bg-left {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1a0508 0%, #2d0a10 40%, #3a0e15 55%);
  clip-path: polygon(0 0, 52% 0, 48% 100%, 0 100%);
  z-index: 0;
}
.bg-right {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #0a1a15 45%, #0d2d22 70%, #08201a 100%);
  clip-path: polygon(52% 0, 100% 0, 100% 100%, 48% 100%);
  z-index: 0;
}

/* ── Lightning along diagonal ── */
.lightning-container {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.lightning-container svg { width: 100%; height: 100%; }
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.lightning-bolt { animation: pulse 2s ease-in-out infinite; }

/* ── Header ── */
.header {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px 40px 10px;
  gap: 20px;
}
.header-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}
.model-tag {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 2px;
}
.model-tag.red  { color: #e84a3a; }
.model-tag.green { color: #5dcaa5; }
.header-vs {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  font-size: 14px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 3px;
}

/* ── Main arena ── */
.arena {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  min-height: 0;
}

/* ── Each side ── */
.side {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}
.haiku-side {
  padding: 0 16px 0 20px;
  gap: 14px;
}
.opus-side {
  padding: 0 20px 0 16px;
  gap: 14px;
}

/* ── Character image ── */
.char-wrap {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  position: relative;
  overflow: hidden;
}
.char-wrap img {
  width: 100%;
  height: auto;
  object-fit: contain;
  display: block;
}
.haiku-side .char-wrap {
  mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent 100%);
}
.opus-side .char-wrap {
  mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, transparent 100%);
  -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, transparent 100%);
}

/* ── SVG list ── */
.svg-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 6px 0 12px;
  min-width: 0;
}
.row {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 0;
}
/* ── Center labels column ── */
.center-labels {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 6px 0 12px;
  width: 80px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  z-index: 3;
}
.center-label {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

.svg-cell {
  flex: 1;
  min-height: 0;
  aspect-ratio: 1;
  max-height: 100%;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(3px);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  border: 1px solid rgba(255,255,255,0.05);
  overflow: hidden;
}
.svg-cell.loser  { border-color: rgba(232,74,58,0.25);  box-shadow: inset 0 0 16px rgba(232,74,58,0.06); }
.svg-cell.winner { border-color: rgba(93,202,165,0.3);  box-shadow: inset 0 0 16px rgba(93,202,165,0.06); }
.svg-cell img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* ── Model banner on each side ── */
.side-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 0;
}

/* ── Footer ── */
.footer {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 8px 0 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.1);
  letter-spacing: 1px;
}
.footer a { color: rgba(93,202,165,0.5); text-decoration: none; }
.footer a:hover { color: rgba(93,202,165,1); text-decoration: underline; }
</style>
</head>
